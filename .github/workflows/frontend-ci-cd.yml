name: Frontend CI/CD

on:
  push:
    branches: ["main", "develop"]
    tags: ["stage-*", "prod-*"]
  pull_request:
    branches: ["main", "develop"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun test

  build-and-push:
    name: Build & Push
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set Env Vars
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/stage-* ]]; then
            echo "TAG_LATEST=staging-latest" >> $GITHUB_OUTPUT
            echo "API_URL=https://api-stage.devboards.io" >> $GITHUB_OUTPUT
          else
            echo "TAG_LATEST=production-latest" >> $GITHUB_OUTPUT
            echo "API_URL=https://api.devboards.io" >> $GITHUB_OUTPUT
          fi
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.vars.outputs.TAG_LATEST }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PUBLIC_API_URL=${{ steps.vars.outputs.API_URL }}
            APP_VERSION=${{ steps.vars.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    if: startsWith(github.ref, 'refs/tags/stage-')
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/html/stage.devboards.io
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sed -i 's/^STAGE_TAG=.*/STAGE_TAG=${{ github.ref_name }}/' .env.production
            docker-compose -f docker-compose.prod.yml pull frontend-stage
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend-stage

      - name: Health Check
        run: curl --fail https://stage.devboards.io/health || exit 1

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/prod-')
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/html/devboards.io
            cp .env.production .rollback_info
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sed -i 's/^PROD_TAG=.*/PROD_TAG=${{ github.ref_name }}/' .env.production
            docker-compose -f docker-compose.prod.yml pull frontend-prod
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend-prod

      - name: Health Check
        run: |
          for i in {1..5}; do
            curl -f https://devboards.io/health && exit 0
            sleep 10
          done
          exit 1
